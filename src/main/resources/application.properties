spring.application.name=HealthManagement

# Database – override with SPRING_DATASOURCE_URL, _USERNAME, _PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/patientmanagement}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dominic}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway (uses the same DB credentials – optional to override separately)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.user=${SPRING_DATASOURCE_USERNAME:dominic}
spring.flyway.password=${SPRING_DATASOURCE_PASSWORD:1234}

# Google AI (already externalised)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.7

# JWT – override with JWT_SECRET
jwt.secret=${JWT_SECRET:fHLR6s1/K3asupb/R64n+30N7Cm7qaCw7I558ELgHsw=}
jwt.expiration=18000000

# Optional: force Hibernate dialect to avoid auto‑detection issues
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect